version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3050:3050"
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - orderworder-net
    restart: unless-stopped

  mongodb:
    image: mongo:7
    command: ["mongod", "--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    volumes:
      - mongo-data:/data/db
    networks:
      - orderworder-net
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles:
      - with-redis
    networks:
      - orderworder-net
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    profiles:
      - with-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - orderworder-net
    restart: unless-stopped

volumes:
  mongo-data:
  n8n-data:

networks:
  orderworder-net:
    driver: bridge
